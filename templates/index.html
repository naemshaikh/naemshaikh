<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrBlack AI | BSC Sniper Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #050505; --card: #0f0f0f; --accent: #00ff00; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow-green { box-shadow: 0 0 15px rgba(0, 255, 0, 0.2); }
    </style>
</head>
<body class="p-4 md:p-8">
    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div class="flex items-center gap-3">
            <i data-lucide="shield-check" class="text-green-500 w-8 h-8"></i>
            <h1 class="text-2xl font-bold mono">MR.BLACK <span class="text-green-500 italic">AI v4.0</span></h1>
        </div>
        <div class="flex gap-3">
            <button id="toggleMode" class="glass px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider">PAPER MODE</button>
            <button id="toggleAuto" class="bg-green-600 px-6 py-2 rounded-lg text-xs font-bold uppercase tracking-wider glow-green">START BOT</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-3 space-y-6">
            <div class="glass p-5 rounded-2xl">
                <p class="text-xs text-white/40 uppercase mb-2">BNB Price</p>
                <p id="bnbPrice" class="text-xl font-bold mono">$0.00</p>
            </div>
            <div class="glass p-5 rounded-2xl border-l-4 border-green-500">
                <p class="text-xs text-white/40 uppercase mb-2">Balance</p>
                <p id="balance" class="text-xl font-bold mono">5.0000</p>
            </div>
        </div>

        <div class="lg:col-span-6 space-y-6">
            <div class="glass p-6 rounded-2xl">
                <h3 class="text-xs font-bold text-white/40 mb-4 uppercase tracking-widest">Safety Scanner</h3>
                <div class="flex gap-2">
                    <input id="tokenAddr" type="text" placeholder="Contract Address" class="flex-1 bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm mono">
                    <button id="scanBtn" class="bg-white text-black px-6 py-3 rounded-lg font-bold text-sm">SCAN</button>
                </div>
                <div id="scanResult" class="hidden mt-6 space-y-3">
                    <div id="overallStatus" class="p-4 rounded-xl flex justify-between items-center font-bold uppercase"></div>
                    <div id="checklistGrid" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>
                </div>
            </div>
            <div class="glass p-6 rounded-2xl h-[300px] overflow-y-auto" id="activityLog"></div>
        </div>

        <div class="lg:col-span-3">
            <div class="glass rounded-2xl h-full flex flex-col border-t-4 border-blue-500">
                <div id="chatBox" class="flex-1 p-4 overflow-y-auto space-y-4 text-sm"></div>
                <div class="p-4 bg-white/5 flex gap-2">
                    <input id="chatInput" type="text" placeholder="Ask MrBlack..." class="flex-1 bg-black/40 border border-white/10 rounded-lg px-3 py-2 text-xs">
                    <button id="sendChat" class="bg-blue-600 p-2 rounded-lg"><i data-lucide="send" class="w-4 h-4"></i></button>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        async function updateStats() {
            const res = await fetch('/auto-stats');
            const data = await res.json();
            document.getElementById('bnbPrice').innerText = `$${data.bnb_price.toLocaleString()}`;
            document.getElementById('balance').innerText = data.paper_bal.toFixed(4);
            document.getElementById('activityLog').innerHTML = data.activity.map(log => `<p class="text-[10px] text-white/60 border-b border-white/5 py-1">${log}</p>`).join('');
        }
        document.getElementById('scanBtn').onclick = async () => {
            const addr = document.getElementById('tokenAddr').value;
            const res = await fetch('/scan', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ address: addr }) });
            const data = await res.json();
            document.getElementById('scanResult').classList.remove('hidden');
            document.getElementById('overallStatus').innerText = `${data.overall} (${data.score}/${data.total})`;
            document.getElementById('checklistGrid').innerHTML = data.checklist.map(i => `<div class="bg-white/5 p-2 rounded text-[10px] flex justify-between"><span>${i.label}</span><span class="${i.status === 'pass' ? 'text-green-500' : 'text-red-500'}">${i.value}</span></div>`).join('');
        };
        setInterval(updateStats, 5000);
        updateStats();
    </script>
</body>
</html>
